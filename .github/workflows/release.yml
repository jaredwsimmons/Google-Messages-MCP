name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  build-cross-platform:
    name: Build CLI binaries
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          version="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          mkdir -p dist
          if [ "$GOOS" = "windows" ]; then
            go build -trimpath -ldflags "-s -w -X main.version=${version}" -o dist/gmessages.exe .
            (cd dist && zip -q "../gmessages-${GOOS}-${GOARCH}.zip" gmessages.exe)
          else
            go build -trimpath -ldflags "-s -w -X main.version=${version}" -o dist/gmessages .
            tar -C dist -czf "gmessages-${GOOS}-${GOARCH}.tar.gz" gmessages
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gmessages-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            gmessages-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            gmessages-${{ matrix.goos }}-${{ matrix.goarch }}.zip
          if-no-files-found: ignore
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: [build-cross-platform]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          tag="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;

          # Generate SHA256 checksums for verification
          (cd release && shasum -a 256 * > SHA256SUMS)

      - name: Generate release notes
        id: notes
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          previous=$(git tag --sort=-v:refname | grep -v "^${tag}$" | head -n1)
          if [ -z "$previous" ]; then
            git log --pretty=format:"- %s (%h)" > NOTES.md
          else
            git log "${previous}..${tag}" --pretty=format:"- %s (%h)" > NOTES.md
          fi
          echo "Generated notes from ${previous:-beginning} to ${tag}"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release/* --clobber
            gh release edit "$tag" --notes-file NOTES.md
          else
            gh release create "$tag" \
              --title "Google Messages MCP ${tag}" \
              --notes-file NOTES.md \
              release/*
          fi
