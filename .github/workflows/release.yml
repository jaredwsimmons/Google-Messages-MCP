name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  build-cross-platform:
    name: Build CLI binaries
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          version="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X main.version=${version}" -o dist/openmessage .
          tar -C dist -czf "openmessage-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" openmessage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openmessage-${{ matrix.goos }}-${{ matrix.goarch }}
          path: openmessage-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
          retention-days: 7

  build-macos-app:
    name: Build macOS .app + .dmg
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build macOS app + DMG
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
          AC_USERNAME: ${{ secrets.AC_USERNAME }}
          AC_PASSWORD: ${{ secrets.AC_PASSWORD }}
          AC_TEAM_ID: ${{ secrets.AC_TEAM_ID }}
        run: bash macos/build.sh

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenMessage-app
          path: macos/build/OpenMessage.app
          retention-days: 7

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenMessage-dmg
          path: macos/build/OpenMessage.dmg
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: [build-cross-platform, build-macos-app]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          tag="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release files
        run: |
          mkdir -p release
          cp artifacts/openmessage-darwin-arm64/openmessage-darwin-arm64.tar.gz release/
          cp artifacts/openmessage-darwin-amd64/openmessage-darwin-amd64.tar.gz release/
          cp artifacts/openmessage-linux-arm64/openmessage-linux-arm64.tar.gz release/
          cp artifacts/openmessage-linux-amd64/openmessage-linux-amd64.tar.gz release/
          cp artifacts/OpenMessage-dmg/OpenMessage.dmg release/

          # Generate SHA256 checksums for verification + Homebrew updates
          (cd release && shasum -a 256 * > SHA256SUMS)

      - name: Generate release notes
        id: notes
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          previous=$(git tag --sort=-v:refname | grep -v "^${tag}$" | head -n1)
          if [ -z "$previous" ]; then
            git log --pretty=format:"- %s (%h)" > NOTES.md
          else
            git log "${previous}..${tag}" --pretty=format:"- %s (%h)" > NOTES.md
          fi
          echo "Generated notes from ${previous:-beginning} to ${tag}"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release/* --clobber
            gh release edit "$tag" --notes-file NOTES.md
          else
            gh release create "$tag" \
              --title "OpenMessage ${tag}" \
              --notes-file NOTES.md \
              release/*
          fi
