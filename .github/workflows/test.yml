name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  GO_COVERAGE_MIN: "40.0"

jobs:
  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go test suite with coverage
        run: go test ./... -coverprofile=coverage.out

      - name: Summarize Go coverage
        run: |
          go tool cover -func=coverage.out | tee coverage.txt
          total=$(awk '/^total:/ {gsub("%", "", $NF); print $NF}' coverage.txt)
          echo "total=${total}" >> "$GITHUB_OUTPUT"
        id: coverage

      - name: Enforce Go coverage floor
        run: |
          awk -v total="${{ steps.coverage.outputs.total }}" -v min="${GO_COVERAGE_MIN}" 'BEGIN { exit !(total + 0 >= min + 0) }'

      - name: Upload Go coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: |
            coverage.out
            coverage.txt

  go-race:
    name: Go Race
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go race suite
        run: go test -race ./...

  e2e:
    name: Web E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright suite
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          if-no-files-found: ignore
          path: |
            playwright-report/
            test-results/

  windows-build:
    name: Windows Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cross-compile for Windows
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build ./...
