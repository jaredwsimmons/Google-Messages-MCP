# Google Messages MCP as a headless server with persistent storage.
#
# Usage:
#     docker compose up -d
#     docker compose exec gmessages gmessages pair    # one-time
#     # then connect Claude / other MCP clients to http://localhost:7007/mcp/sse

services:
  gmessages:
    build: .
    image: gmessages:latest
    container_name: gmessages
    restart: unless-stopped
    ports:
      - "7007:7007"
    volumes:
      - gmessages-data:/data
    environment:
      GMESSAGES_DATA_DIR: /data
      GMESSAGES_HOST: 0.0.0.0
      GMESSAGES_PORT: "7007"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7007/api/status >/dev/null || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3

volumes:
  gmessages-data:
